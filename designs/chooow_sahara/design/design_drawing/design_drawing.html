<script>
        // Simple micro-interactions for the designer studio
        const shirtPreview = document.getElementById('shirt-preview');
        const colorButtons = document.querySelectorAll('.flex-wrap button');

        colorButtons.forEach(btn => {
            btn.addEventListener('click', () => {
                // Remove active rings from others
                colorButtons.forEach(b => {
                    b.classList.remove('border-primary', 'ring-2', 'ring-primary/20');
                    b.classList.add('border-outline-variant');
                });
                // Add active state
                btn.classList.add('border-primary', 'ring-2', 'ring-primary/20');
                btn.classList.remove('border-outline-variant');
                
                // Visual feedback on preview (simplified)
                shirtPreview.style.filter = `brightness(0.95) contrast(1.1) saturate(0.8)`;
                setTimeout(() => {
                    shirtPreview.style.filter = `none`;
                }, 150);
            });
        });

        // Toggle Tabs (simplified)
        const tabs = document.querySelectorAll('section > div:first-child button');
        tabs.forEach(tab => {
            tab.addEventListener('click', () => {
                tabs.forEach(t => {
                    t.classList.remove('border-primary', 'text-primary', 'font-bold');
                    t.classList.add('border-transparent', 'text-on-surface-variant');
                });
                tab.classList.remove('border-transparent', 'text-on-surface-variant');
                tab.classList.add('border-primary', 'text-primary', 'font-bold');
            });
        });
    </script>
