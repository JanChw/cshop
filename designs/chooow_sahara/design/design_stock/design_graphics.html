<!-- Micro-interactions Script -->
<script>
        document.querySelectorAll('.col-span-1, .col-span-2').forEach(item => {
            item.addEventListener('click', function() {
                // Flash effect for selection
                const originalBg = this.style.backgroundColor;
                this.classList.add('ring-2', 'ring-primary');
                setTimeout(() => {
                    this.classList.remove('ring-2', 'ring-primary');
                }, 300);
            });
        });

        // Simple tab switching logic simulation
        const tabs = document.querySelectorAll('nav div button');
        tabs.forEach(tab => {
            tab.addEventListener('click', function() {
                tabs.forEach(t => {
                    t.classList.remove('text-primary', 'font-bold', 'active-underline');
                    t.classList.add('text-on-surface-variant', 'font-medium');
                });
                this.classList.add('text-primary', 'font-bold', 'active-underline');
                this.classList.remove('text-on-surface-variant', 'font-medium');
            });
        });
    </script>
