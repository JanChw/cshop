<script>
        // Simple Interaction logic for tabs
        const tabs = document.querySelectorAll('.flex.gap-stack-sm.overflow-x-auto button');
        tabs.forEach(tab => {
            tab.addEventListener('click', () => {
                tabs.forEach(t => {
                    t.classList.remove('bg-primary', 'text-on-primary');
                    t.classList.add('bg-surface-container-high', 'text-on-surface-variant');
                });
                tab.classList.remove('bg-surface-container-high', 'text-on-surface-variant');
                tab.classList.add('bg-primary', 'text-on-primary');
            });
        });

        // Search feedback
        const searchInput = document.querySelector('input[type="text"]');
        searchInput.addEventListener('input', (e) => {
            if (e.target.value.length > 0) {
                searchInput.classList.add('border-primary');
                searchInput.classList.add('ring-2');
                searchInput.classList.add('ring-primary/20');
            } else {
                searchInput.classList.remove('border-primary');
                searchInput.classList.remove('ring-2');
                searchInput.classList.remove('ring-primary/20');
            }
        });
    </script>
