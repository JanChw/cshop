<!DOCTYPE html>

<html lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>登录 - ByChooow</title>
<!-- Fonts: EB Garamond & Manrope -->
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400;500;600;700;800&amp;family=Manrope:wght@300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<!-- Material Symbols -->

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-tertiary-container": "#3a2020",
                        "on-secondary-fixed": "#2a2420",
                        "surface": "#faf5ee",
                        "inverse-primary": "#f0a878",
                        "surface-variant": "#ece6dc",
                        "surface-container": "#f2ece4",
                        "surface-container-lowest": "#ffffff",
                        "on-secondary-fixed-variant": "#504840",
                        "primary": "#c2652a",
                        "on-error-container": "#7a1a10",
                        "tertiary-fixed-dim": "#e8a0a0",
                        "inverse-surface": "#3a302a",
                        "surface-dim": "#dcd6cc",
                        "secondary-fixed": "#eae2da",
                        "on-surface-variant": "#605850",
                        "on-primary-container": "#fbe8d8",
                        "secondary-container": "#eae2da",
                        "primary-container": "#e08850",
                        "outline-variant": "#d8d0c8",
                        "on-error": "#ffffff",
                        "on-tertiary-fixed-variant": "#6e3030",
                        "on-secondary-container": "#605850",
                        "on-surface": "#3a302a",
                        "surface-container-highest": "#e6e0d6",
                        "on-background": "#3a302a",
                        "on-secondary": "#ffffff",
                        "secondary-fixed-dim": "#cec6be",
                        "surface-container-low": "#f6f0e8",
                        "on-primary-fixed": "#401a08",
                        "tertiary": "#8c3c3c",
                        "surface-bright": "#faf5ee",
                        "tertiary-container": "#d47070",
                        "inverse-on-surface": "#faf5ee",
                        "surface-container-high": "#ece6dc",
                        "secondary": "#78706a",
                        "error-container": "#fce4e0",
                        "error": "#c0392b",
                        "primary-fixed": "#fbe8d8",
                        "primary-fixed-dim": "#f0a878",
                        "outline": "#9a9088",
                        "on-tertiary": "#ffffff",
                        "surface-tint": "#c2652a",
                        "background": "#faf5ee",
                        "tertiary-fixed": "#fce0e0",
                        "on-primary-fixed-variant": "#8a4518",
                        "on-primary": "#ffffff",
                        "on-tertiary-fixed": "#2e1515"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["EB Garamond", "serif"],
                        "display": ["EB Garamond", "serif"],
                        "body": ["Manrope", "sans-serif"],
                        "label": ["Manrope", "sans-serif"]
                    }
                }
            }
        }
    </script>
<style>
        body { font-family: 'Manrope', sans-serif; }
        .font-headline { font-family: 'EB Garamond', serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        /* Custom subtle texture for Sahara look */
        .sahara-texture {
            background-image: url("https://www.transparenttextures.com/patterns/natural-paper.png");
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface min-h-screen flex flex-col sahara-texture">
<!-- Header (Shared Component: TopAppBar Reference) -->
<!-- Rule: The "Destination" Rule - Suppressed for Login screens per instructions, but the prompt explicitly asked for Top brand name. 
         We will render it as a simple centered header without navigation icons to maintain focus. -->
<header class="fixed top-0 w-full z-50 flex justify-center items-center h-20 bg-transparent">
<h1 class="font-headline text-3xl font-bold text-primary tracking-tight">ByChooow</h1>
</header>
<main class="flex-grow flex items-center justify-center px-6 py-24">
<div class="w-full max-w-md">
<!-- Branding & Welcome Message -->
<div class="text-center mb-10 space-y-2">
<h2 class="font-headline text-4xl md:text-5xl text-on-surface font-semibold">欢迎回来</h2>
<p class="text-on-surface-variant font-body text-sm tracking-wide">登录以继续您的创意之旅</p>
</div>
<!-- Login Form -->
<div class="bg-surface-container-low p-8 md:p-10 rounded-[8px] shadow-[0_2px_16px_rgba(58,48,42,0.04)] border border-outline-variant/60">
<form class="space-y-6" id="loginForm">
<!-- Email / Phone Input -->
<div class="space-y-2">
<label class="block text-xs font-bold uppercase tracking-widest text-secondary ml-1" for="identifier">邮箱 / 手机号</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors">mail</span>
<input class="w-full pl-12 pr-4 py-3.5 bg-surface-container-lowest border border-outline-variant rounded-[8px] focus:ring-1 focus:ring-primary focus:border-primary outline-none transition-all placeholder:text-outline/60" id="identifier" name="identifier" placeholder="输入您的联系方式" required="" type="text"/>
</div>
</div>
<!-- Password Input -->
<div class="space-y-2">
<div class="flex justify-between items-end">
<label class="block text-xs font-bold uppercase tracking-widest text-secondary ml-1" for="password">密码</label>
<a class="text-xs font-semibold text-primary hover:opacity-80 transition-opacity" href="#">忘记密码？</a>
</div>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors">lock</span>
<input class="w-full pl-12 pr-12 py-3.5 bg-surface-container-lowest border border-outline-variant rounded-[8px] focus:ring-1 focus:ring-primary focus:border-primary outline-none transition-all placeholder:text-outline/60" id="password" name="password" placeholder="输入您的密码" required="" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-outline hover:text-on-surface transition-colors" onclick="togglePassword()" type="button">
<span class="material-symbols-outlined" id="password-toggle-icon">visibility</span>
</button>
</div>
</div>
<!-- Submit Button -->
<button class="w-full bg-primary text-white py-4 px-6 rounded-[8px] font-bold tracking-wide flex items-center justify-center space-x-2 hover:opacity-90 active:scale-[0.98] transition-all group shadow-lg shadow-primary/10" type="submit">
<span>登录</span>
<span class="material-symbols-outlined text-xl group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
</form>
<!-- Third Party Login -->
<div class="mt-10">
<div class="relative flex items-center mb-8">
<div class="flex-grow border-t border-outline-variant/60"></div>
<span class="flex-shrink mx-4 text-xs font-bold text-outline uppercase tracking-widest">使用其他方式登录</span>
<div class="flex-grow border-t border-outline-variant/60"></div>
</div>
<div class="grid grid-cols-2 gap-4">
<button class="flex items-center justify-center space-x-3 py-3 px-4 border border-outline-variant rounded-[8px] hover:bg-surface-variant transition-colors group">
<!-- Simple custom icon structure using CSS/Text to avoid complex SVG bloat -->
<div class="w-6 h-6 flex items-center justify-center bg-[#07C160] rounded-full">
<span class="material-symbols-outlined text-white text-[16px]" style="font-variation-settings: 'FILL' 1;">chat</span>
</div>
<span class="text-sm font-semibold text-on-surface-variant">微信</span>
</button>
<button class="flex items-center justify-center space-x-3 py-3 px-4 border border-outline-variant rounded-[8px] hover:bg-surface-variant transition-colors group">
<div class="w-6 h-6 flex items-center justify-center bg-[#12B7F5] rounded-full">
<span class="material-symbols-outlined text-white text-[16px]" style="font-variation-settings: 'FILL' 1;">person</span>
</div>
<span class="text-sm font-semibold text-on-surface-variant">QQ</span>
</button>
</div>
</div>
</div>
<!-- Footer Link -->
<p class="mt-8 text-center text-on-surface-variant text-sm font-medium">
                还没有账号？ 
                <a class="text-primary font-bold hover:underline decoration-2 underline-offset-4" href="#">立即注册</a>
</p>
</div>
</main>
<!-- Background Decorative Element (Abstract Texture) -->
<div class="fixed top-0 right-0 -z-10 w-1/3 h-1/3 blur-3xl opacity-20 bg-primary/20 pointer-events-none"></div>
<div class="fixed bottom-0 left-0 -z-10 w-1/2 h-1/2 blur-[100px] opacity-30 bg-secondary-container/50 pointer-events-none"></div>
<script>
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const toggleIcon = document.getElementById('password-toggle-icon');
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleIcon.innerText = 'visibility_off';
            } else {
                passwordInput.type = 'password';
                toggleIcon.innerText = 'visibility';
            }
        }

        // Form submission animation
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = this.querySelector('button[type="submit"]');
            const originalContent = btn.innerHTML;
            
            btn.disabled = true;
            btn.innerHTML = `<span class="inline-block animate-spin material-symbols-outlined">progress_activity</span>`;
            
            setTimeout(() => {
                btn.innerHTML = `<span class="material-symbols-outlined">check_circle</span> <span>成功</span>`;
                btn.classList.add('bg-on-surface-variant');
            }, 1200);
        });
    </script>
</body></html>
