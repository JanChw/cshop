<div class="grid grid-cols-3 gap-3">

                退出当前登录

<p class="text-[10px] text-on-surface-variant/50 font-label">UID: BC88240951 | ByChooow 2.4.0</p>

</main>
<!-- Bottom Navigation Bar (Contextual Check: Hidden for transactional task-focused page as per rules) -->
<!-- But following the shared JSON, I will include it if the page is considered a top-level destination. -->
<!-- Edit Profile is a sub-page (task-focused), so suppression is preferred for UX focus. -->
<script>
        // Simple interactivity for the form
        document.querySelectorAll('input, textarea').forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.classList.add('shadow-md');
            });
            input.addEventListener('blur', () => {
                input.parentElement.classList.remove('shadow-md');
            });
        });

        // Gender selection simulation
        const genderButtons = document.querySelectorAll('.grid-cols-3 button');
        genderButtons.forEach(btn => {
            btn.addEventListener('click', () => {
                genderButtons.forEach(b => {
                    b.classList.remove('border-2', 'border-primary', 'bg-primary-fixed', 'text-primary', 'font-semibold');
                    b.classList.add('border', 'border-outline-variant', 'bg-white', 'text-on-surface-variant');
                    const icon = b.querySelector('.material-symbols-outlined');
                    if(icon) icon.style.fontVariationSettings = "'FILL' 0";
                });
                btn.classList.add('border-2', 'border-primary', 'bg-primary-fixed', 'text-primary', 'font-semibold');
                btn.classList.remove('border', 'border-outline-variant', 'bg-white', 'text-on-surface-variant');
                const icon = btn.querySelector('.material-symbols-outlined');
                if(icon) icon.style.fontVariationSettings = "'FILL' 1";
            });
        });
    </script>
