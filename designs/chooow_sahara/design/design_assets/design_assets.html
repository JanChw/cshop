<script>
        // Simple micro-interaction for the upload area
        const uploadZone = document.querySelector('.upload-dashed');
        uploadZone.addEventListener('click', () => {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/png, image/jpeg';
            input.onchange = (e) => {
                const file = e.target.files[0];
                if (file) {
                    alert(`Selected: ${file.name}. In a real app, this would start the upload process.`);
                }
            };
            input.click();
        });

        // Toggle mobile drawer placeholder (optional functionality)
