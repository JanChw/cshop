<script>
        let selectedCount = 1;
        const selectionBar = document.getElementById('selection-bar');
        const countIndicator = selectionBar.querySelector('.font-bold');
        const countText = selectionBar.querySelector('p');

        function toggleSelection(el) {
            const indicator = el.querySelector('.selection-indicator');
            const check = indicator.querySelector('.material-symbols-outlined');
            const imgContainer = el.querySelector('.overflow-hidden');
            const label = el.querySelector('.font-label');

            if (el.classList.contains('selection-active')) {
                el.classList.remove('selection-active');
                indicator.classList.remove('bg-primary');
                indicator.classList.add('bg-white/80');
                check.classList.add('hidden');
                imgContainer.classList.remove('border-2', 'border-primary');
                imgContainer.querySelector('img').classList.remove('scale-110');
                label.classList.remove('text-primary', 'font-bold');
                label.classList.add('text-on-surface-variant');
                selectedCount--;
            } else {
                el.classList.add('selection-active');
                indicator.classList.add('bg-primary');
                indicator.classList.remove('bg-white/80');
                check.classList.remove('hidden');
                imgContainer.classList.add('border-2', 'border-primary');
                imgContainer.querySelector('img').classList.add('scale-110');
                label.classList.add('text-primary', 'font-bold');
                label.classList.remove('text-on-surface-variant');
                selectedCount++;
            }

            updateSelectionBar();
        }

        function updateSelectionBar() {
            if (selectedCount > 0) {
                selectionBar.style.transform = 'translate(-50%, 0)';
                selectionBar.style.opacity = '1';
                countIndicator.innerText = selectedCount;
                countText.innerText = `已选定 ${selectedCount} 个图形`;
            } else {
                selectionBar.style.transform = 'translate(-50%, 150%)';
                selectionBar.style.opacity = '0';
            }
        }
    </script>
