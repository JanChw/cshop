<!DOCTYPE html>

<html lang="zh-CN"><head>

<style>
        body { font-family: 'Manrope', sans-serif; background-color: #faf5ee; }
        .font-serif { font-family: 'Eb Garamond', serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-surface min-h-screen pb-24">
<!-- Top App Bar -->
<header class="bg-surface dark:bg-inverse-surface border-b border-outline-variant dark:border-outline flex justify-between items-center px-4 h-16 w-full sticky top-0 z-50">
<div class="flex items-center gap-4">
<button class="p-2 hover:bg-surface-container-high transition-colors rounded-full active:scale-95 duration-100">
<span class="material-symbols-outlined text-primary">arrow_back</span>
</button>
<h1 class="text-on-surface dark:text-inverse-on-surface font-headline text-xl font-semibold">账号与安全</h1>
</div>
<div class="flex items-center">
<button class="p-2 hover:bg-surface-container-high transition-colors rounded-full active:scale-95 duration-100">
<span class="material-symbols-outlined text-on-surface-variant">info</span>
</button>
</div>
</header>
<main class="max-w-md mx-auto px-4 py-6 space-y-6">
<!-- Security Status Section -->
<section class="bg-surface-container-low p-8 rounded-xl border border-outline-variant/60 flex flex-col items-center text-center shadow-sm">
<div class="relative mb-4">
<div class="w-20 h-20 rounded-full border-4 border-primary/20 flex items-center justify-center">
<span class="material-symbols-outlined text-4xl text-primary" style="font-variation-settings: 'FILL' 1;">verified_user</span>
</div>
<div class="absolute -bottom-1 -right-1 bg-primary text-white p-1 rounded-full border-2 border-surface">
<span class="material-symbols-outlined text-sm">check</span>
</div>
</div>
<h2 class="font-headline text-2xl font-bold text-on-surface mb-1">账号安全等级：高</h2>
<p class="text-on-surface-variant text-sm font-body">您的账号正处于严密保护中，请继续保持良好的安全习惯</p>
</section>
<!-- Main Security Options -->
<div class="space-y-2">
<h3 class="px-2 text-label-md font-bold text-primary tracking-wider uppercase opacity-80 mb-2">安全设置</h3>
<div class="bg-surface-container-lowest rounded-xl overflow-hidden border border-outline-variant/40">
<!-- Change Password -->
<button class="w-full flex items-center justify-between p-5 hover:bg-surface-container-high transition-all active:bg-surface-container-highest group">
<div class="flex items-center gap-4">
<div class="bg-primary/10 p-2 rounded-lg text-primary">
<span class="material-symbols-outlined">lock_reset</span>
</div>
<span class="text-on-surface font-medium">修改登录密码</span>
</div>
<div class="flex items-center gap-2">
<span class="text-xs text-on-surface-variant opacity-60">定期更换更安全</span>
<span class="material-symbols-outlined text-outline group-hover:translate-x-1 transition-transform">chevron_right</span>
</div>
</button>
<div class="h-[1px] bg-outline-variant/30 mx-5"></div>
<!-- Bind Phone -->
<button class="w-full flex items-center justify-between p-5 hover:bg-surface-container-high transition-all active:bg-surface-container-highest group">
<div class="flex items-center gap-4">
<div class="bg-primary/10 p-2 rounded-lg text-primary">
<span class="material-symbols-outlined">phone_android</span>
</div>
<span class="text-on-surface font-medium">绑定手机号</span>
</div>
<div class="flex items-center gap-2">
<span class="text-sm text-on-surface-variant">138****8888</span>
<span class="material-symbols-outlined text-outline group-hover:translate-x-1 transition-transform">chevron_right</span>
</div>
</button>
<div class="h-[1px] bg-outline-variant/30 mx-5"></div>
<!-- Identity Verification -->
<button class="w-full flex items-center justify-between p-5 hover:bg-surface-container-high transition-all active:bg-surface-container-highest group">
<div class="flex items-center gap-4">
<div class="bg-primary/10 p-2 rounded-lg text-primary">
<span class="material-symbols-outlined">badge</span>
</div>
<span class="text-on-surface font-medium">实名认证</span>
</div>
<div class="flex items-center gap-2">
<span class="bg-primary-container text-on-primary-container text-[10px] px-2 py-0.5 rounded-full font-bold">已认证</span>
<span class="material-symbols-outlined text-outline group-hover:translate-x-1 transition-transform">chevron_right</span>
</div>
</button>
<div class="h-[1px] bg-outline-variant/30 mx-5"></div>
<!-- Device Management -->
<button class="w-full flex items-center justify-between p-5 hover:bg-surface-container-high transition-all active:bg-surface-container-highest group">
<div class="flex items-center gap-4">
<div class="bg-primary/10 p-2 rounded-lg text-primary">
<span class="material-symbols-outlined">devices</span>
</div>
<span class="text-on-surface font-medium">登录设备管理</span>
</div>
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-outline group-hover:translate-x-1 transition-transform">chevron_right</span>
</div>
</button>
</div>
</div>
<!-- Secondary Options -->
<div class="space-y-2">
<h3 class="px-2 text-label-md font-bold text-primary tracking-wider uppercase opacity-80 mb-2">更多</h3>
<div class="bg-surface-container-lowest rounded-xl overflow-hidden border border-outline-variant/40">
<button class="w-full flex items-center justify-between p-5 hover:bg-surface-container-high transition-all active:bg-surface-container-highest group">
<div class="flex items-center gap-4">
<div class="bg-tertiary-container/10 p-2 rounded-lg text-tertiary">
<span class="material-symbols-outlined">no_accounts</span>
</div>
<span class="text-on-surface font-medium">账号注销</span>
</div>
<span class="material-symbols-outlined text-outline group-hover:translate-x-1 transition-transform">chevron_right</span>
</button>
</div>
</div>
<!-- Visual Decorative Area -->
<div class="mt-8 rounded-2xl overflow-hidden relative aspect-video shadow-lg">
<div class="absolute inset-0 bg-gradient-to-t from-black/60 to-transparent z-10"></div>
<img alt="Cyber Security Concept" class="w-full h-full object-cover grayscale-[0.2] brightness-90" data-alt="A macro close-up of a high-tech security chip glowing with warm orange and golden light within a minimalist, sun-baked sand colored metallic environment. The atmosphere is sophisticated and calm, with soft light-mode shadows creating a sense of premium protection and warmth. Cinematic lighting emphasizes the textures of the brushed metal surface and the intricate circuitry patterns, following a warm minimalism aesthetic." src="https://lh3.googleusercontent.com/aida-public/AB6AXuCWhlDdv4dfqIxDT58CnqsWbOWM2iWjCixvQwCKYbmd0xYPNt1_L5U8SfSxoLYX7sAy6WDtdJnD03tJ4zPh2ukiJY05I-sbt3ddYAy_gRDrKG0V1y8RlOwkaG0uoTOQ9HO8Arru8qtLd7zI7y146NP-cMPWmA63-WPEsTkZHgOtNTnd6epVWV7i0sxHcMetw6ZSCFUyISbpkbo5TuzsnANiwKaO6GqDn7bP2tokzo08G4nzRednG5x1yvJ1BRaYiUs_qv9MB5IeNtU"/>
<div class="absolute bottom-4 left-6 z-20 text-white">
<h4 class="font-headline text-lg font-bold">数据隐私保护</h4>
<p class="text-xs opacity-80 font-body">我们致力于守护您的每一份数据资产</p>
</div>
</div>
</main>
<!-- Bottom Navigation Bar -->
<nav class="fixed bottom-0 w-full z-50 flex justify-around items-center px-4 py-2 bg-surface dark:bg-inverse-surface border-t border-outline-variant dark:border-outline">
<button class="flex flex-col items-center justify-center text-on-surface-variant dark:text-on-surface-variant px-3 py-1 hover:text-primary dark:hover:text-primary-fixed transition-all active:scale-90 duration-150">
<span class="material-symbols-outlined">home</span>
<span class="font-label-md text-xs mt-1">Home</span>
</button>
<button class="flex flex-col items-center justify-center text-on-surface-variant dark:text-on-surface-variant px-3 py-1 hover:text-primary dark:hover:text-primary-fixed transition-all active:scale-90 duration-150">
<span class="material-symbols-outlined">draw</span>
<span class="font-label-md text-xs mt-1">Design</span>
</button>
<button class="flex flex-col items-center justify-center text-on-surface-variant dark:text-on-surface-variant px-3 py-1 hover:text-primary dark:hover:text-primary-fixed transition-all active:scale-90 duration-150">
<span class="material-symbols-outlined">shopping_cart</span>
<span class="font-label-md text-xs mt-1">Cart</span>
</button>
<button class="flex flex-col items-center justify-center text-on-surface-variant dark:text-on-surface-variant px-3 py-1 hover:text-primary dark:hover:text-primary-fixed transition-all active:scale-90 duration-150">
<span class="material-symbols-outlined">storefront</span>
<span class="font-label-md text-xs mt-1">Shop</span>
</button>
<!-- Active Tab: Profile -->
<button class="flex flex-col items-center justify-center bg-primary-container text-on-primary-container rounded-lg px-3 py-1 transition-all active:scale-90 duration-150">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">person</span>
<span class="font-label-md text-xs mt-1">Profile</span>
</button>
</nav>
<script>
        // Micro-interaction for feedback
        document.querySelectorAll('button').forEach(button => {
            button.addEventListener('click', function() {
                this.classList.add('scale-95');
                setTimeout(() => this.classList.remove('scale-95'), 150);
            });
        });

        // Add subtle animation to the security icon on load
        window.addEventListener('DOMContentLoaded', () => {
            const icon = document.querySelector('.material-symbols-outlined.text-4xl');
            if(icon) {
                icon.style.transition = 'transform 1s cubic-bezier(0.34, 1.56, 0.64, 1)';
                icon.style.transform = 'scale(0)';
                setTimeout(() => {
                    icon.style.transform = 'scale(1)';
                }, 300);
            }
        });
    </script>
</body></html>
