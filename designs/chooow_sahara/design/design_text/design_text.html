<input class="w-full" max="1" min="0" oninput="document.getElementById('letter-spacing-display').innerText = this.value + 'em'; document.getElementById('preview-text').style.letterSpacing = this.value + 'em'" step="0.01" type="range" value="0.1"/>

<!-- Overlay -->
<div class="fixed inset-0 bg-black/40 z-[65] hidden" id="drawer-overlay"></div>
<script>
        const menuBtn = document.getElementById('menu-toggle');
        const drawer = document.getElementById('drawer');
        const overlay = document.getElementById('drawer-overlay');

        menuBtn.addEventListener('click', () => {
            drawer.classList.remove('-translate-x-full');
            overlay.classList.remove('hidden');
        });

        overlay.addEventListener('click', () => {
            drawer.classList.add('-translate-x-full');
            overlay.classList.add('hidden');
        });

        // Tab selection visual update
        const tabButtons = document.querySelectorAll('.sticky button');
        tabButtons.forEach(button => {
            button.addEventListener('click', () => {
                tabButtons.forEach(btn => {
                    btn.classList.remove('text-primary', 'font-bold', 'border-primary', 'border-b-2');
                    btn.classList.add('text-on-surface-variant', 'font-medium');
                });
                button.classList.add('text-primary', 'font-bold', 'border-primary', 'border-b-2');
                button.classList.remove('text-on-surface-variant', 'font-medium');
            });
        });
    </script>
