<script>
        // Simple micro-interaction for color selection
        const swatches = document.querySelectorAll('.grid > div');
        const previewImg = document.getElementById('tshirt-preview');

        swatches.forEach(swatch => {
            swatch.addEventListener('click', () => {
                // Clear active states
                swatches.forEach(s => {
                    const circle = s.querySelector('.w-16');
                    circle.classList.remove('active-swatch');
                    const icon = s.querySelector('.material-symbols-outlined');
                    if (icon) icon.remove();
                    const label = s.querySelector('span');
                    label.classList.remove('text-on-surface', 'font-medium');
                    label.classList.add('text-secondary');
                });

                // Set active state
                const currentCircle = swatch.querySelector('.w-16');
                currentCircle.classList.add('active-swatch');
                
                const checkIcon = document.createElement('span');
                checkIcon.className = 'material-symbols-outlined text-primary text-lg';
                checkIcon.style.fontVariationSettings = "'FILL' 1";
                checkIcon.innerText = 'check_circle';
                currentCircle.appendChild(checkIcon);

                const currentLabel = swatch.querySelector('span');
                currentLabel.classList.remove('text-secondary');
                currentLabel.classList.add('text-on-surface', 'font-medium');

                // Simulate preview color change (using filters for demo)
                const bgColor = window.getComputedStyle(currentCircle).backgroundColor;
                if (bgColor === 'rgb(26, 26, 26)') {
                    previewImg.style.filter = 'brightness(0.3)';
                } else if (bgColor === 'rgb(194, 101, 42)') {
                    previewImg.style.filter = 'sepia(0.5) hue-rotate(-20deg) saturate(2)';
                } else if (bgColor === 'rgb(45, 74, 62)') {
                    previewImg.style.filter = 'hue-rotate(100deg) brightness(0.7)';
                } else if (bgColor === 'rgb(140, 60, 60)') {
                    previewImg.style.filter = 'hue-rotate(-40deg) brightness(0.6)';
                } else if (bgColor === 'rgb(181, 181, 181)') {
                    previewImg.style.filter = 'grayscale(1) brightness(0.9)';
                } else {
                    previewImg.style.filter = 'none';
                }
            });
        });

        // Pull to refresh simulation or basic smooth loading
        window.addEventListener('load', () => {
            document.body.classList.add('opacity-100');
        });
    </script>
