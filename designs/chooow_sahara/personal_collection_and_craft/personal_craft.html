<span class="material-symbols-outlined">add</span>
</button>
<script>
        function switchTab(tab) {
            const favContent = document.getElementById('content-favorites');
            const draftContent = document.getElementById('content-drafts');
            const favTabBtn = document.getElementById('tab-favorites');
            const draftTabBtn = document.getElementById('tab-drafts');
            const fab = document.getElementById('fab-create');

            if (tab === 'favorites') {
                favContent.classList.remove('hidden');
                setTimeout(() => favContent.classList.add('opacity-100'), 10);
                draftContent.classList.add('hidden');
                draftContent.classList.remove('opacity-100');
                
                favTabBtn.classList.add('active-tab');
                favTabBtn.classList.remove('text-on-surface-variant/60');
                draftTabBtn.classList.remove('active-tab');
                draftTabBtn.classList.add('text-on-surface-variant/60');
                
                fab.classList.add('hidden');
            } else {
                draftContent.classList.remove('hidden');
                setTimeout(() => draftContent.classList.add('opacity-100'), 10);
                favContent.classList.add('hidden');
                favContent.classList.remove('opacity-100');

                draftTabBtn.classList.add('active-tab');
                draftTabBtn.classList.remove('text-on-surface-variant/60');
                favTabBtn.classList.remove('active-tab');
                favTabBtn.classList.add('text-on-surface-variant/60');

                fab.classList.remove('hidden');
            }
        }

        // Simple smooth scroll logic or tab persistence if needed can go here.
        // For now, pure tab switching.
    </script>
